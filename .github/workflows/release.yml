name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64

    env:
      CGO_ENABLED: "0"
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
      # Tag push: semver tag (e.g. v1.0.0). Branch push: v0.0.1, v0.0.2, … (patch from workflow run #).
      VERSION: ${{ github.ref_type == 'tag' && github.ref_name || format('v0.0.{0}', github.run_number) }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build and package
        run: |
          set -euo pipefail
          BINARY="tars"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BINARY="tars.exe"
          fi
          go build -trimpath -ldflags="-s -w -X tars/internal/version.Version=${VERSION}" -o "$BINARY" ./cmd/tars
          mkdir -p dist
          STEM="tars_${VERSION}_${{ matrix.goos }}_${{ matrix.goarch }}"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip -j "dist/${STEM}.zip" "$BINARY"
          else
            tar -czvf "dist/${STEM}.tar.gz" "$BINARY"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ github.ref_type == 'tag' && github.ref_name || format('v0.0.{0}', github.run_number) }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Prepare release assets
        run: |
          set -euo pipefail
          mkdir -p release
          find artifacts -type f \( -name '*.zip' -o -name '*.tar.gz' \) -exec cp {} release/ \;
          cd release
          # Stable names so https://github.com/OWNER/REPO/releases/latest/download/<file> always points at the newest build.
          for f in tars_*_linux_amd64.tar.gz; do [ -f "$f" ] && cp "$f" tars_linux_amd64.tar.gz && break; done
          for f in tars_*_linux_arm64.tar.gz; do [ -f "$f" ] && cp "$f" tars_linux_arm64.tar.gz && break; done
          for f in tars_*_darwin_amd64.tar.gz; do [ -f "$f" ] && cp "$f" tars_darwin_amd64.tar.gz && break; done
          for f in tars_*_darwin_arm64.tar.gz; do [ -f "$f" ] && cp "$f" tars_darwin_arm64.tar.gz && break; done
          for f in tars_*_windows_amd64.zip; do [ -f "$f" ] && cp "$f" tars_windows_amd64.zip && break; done
          for f in tars_*_windows_arm64.zip; do [ -f "$f" ] && cp "$f" tars_windows_arm64.zip && break; done
          sha256sum tars_* > checksums.txt

      # Immutable-release repos: prereleases become published before all assets finish uploading.
      # Create as draft, attach every asset, then publish (see action-gh-release draft input notes).
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: ${{ env.VERSION }}
          prerelease: ${{ github.ref_type != 'tag' }}
          draft: true
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish release
        run: gh release edit "${VERSION}" --draft=false --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
